apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: semantic-cache-ingress
  namespace: semantic-cache
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
  - hosts:
    - cache.yourdomain.com
    secretName: semantic-cache-tls
  rules:
  - host: cache.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: semantic-cache-api
            port:
              number: 80
