# Location blocks for Nginx
# Included by main nginx.conf

# =========================================================================
# HEALTH CHECK ENDPOINT
# =========================================================================

location /health {
    access_log off;
    proxy_pass http://api_servers/health;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
}

location /ready {
    access_log off;
    proxy_pass http://api_servers/health;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
}

# =========================================================================
# CACHE API ENDPOINTS
# =========================================================================

location /cache {
    # Rate limiting
    limit_req zone=api_limit burst=50 nodelay;
    limit_req zone=tenant_limit burst=200 nodelay;
    limit_conn conn_limit 100;
    
    # Proxy settings
    proxy_pass http://api_servers;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    
    # Timeouts for LLM operations (can be slow)
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;  # Allow for slow LLM responses
    
    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
    
    # Error handling
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 30s;
}

# =========================================================================
# STREAMING ENDPOINT (for streaming LLM responses)
# =========================================================================

location /cache/stream {
    # Rate limiting
    limit_req zone=api_limit burst=20 nodelay;
    limit_conn conn_limit 50;
    
    # Proxy settings for streaming
    proxy_pass http://api_servers;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # Disable buffering for streaming
    proxy_buffering off;
    proxy_cache off;
    
    # SSE specific
    proxy_set_header Accept text/event-stream;
    chunked_transfer_encoding on;
    
    # Longer timeouts for streaming
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
}

# =========================================================================
# ANALYTICS ENDPOINTS
# =========================================================================

location /analytics {
    # Rate limiting (analytics can be expensive)
    limit_req zone=api_limit burst=10 nodelay;
    
    proxy_pass http://api_servers;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # Cache analytics responses briefly
    proxy_cache_valid 200 5s;
}

# =========================================================================
# ADMIN ENDPOINTS
# =========================================================================

location /admin {
    # Stricter rate limiting for admin
    limit_req zone=api_limit burst=5 nodelay;
    limit_conn conn_limit 10;
    
    # TODO: Add authentication in production
    # auth_basic "Admin Area";
    # auth_basic_user_file /etc/nginx/.htpasswd;
    
    # Or use IP whitelist:
    # allow 10.0.0.0/8;
    # allow 172.16.0.0/12;
    # allow 192.168.0.0/16;
    # deny all;
    
    proxy_pass http://api_servers;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# =========================================================================
# METRICS ENDPOINT (Prometheus)
# =========================================================================

location /metrics {
    # Limit access to internal monitoring
    # allow 10.0.0.0/8;
    # deny all;
    
    access_log off;
    
    proxy_pass http://api_servers;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
}

# =========================================================================
# NGINX STATUS (for monitoring nginx itself)
# =========================================================================

location /nginx_status {
    stub_status on;
    access_log off;
    
    # Limit to internal monitoring
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
}

# =========================================================================
# DEFAULT - PROXY ALL OTHER REQUESTS
# =========================================================================

location / {
    limit_req zone=api_limit burst=50 nodelay;
    
    proxy_pass http://api_servers;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}
