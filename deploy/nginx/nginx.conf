# Nginx Load Balancer Configuration for Distributed Semantic Cache
#
# This configuration provides:
# - Load balancing across multiple API instances
# - Health checks and automatic failover
# - Rate limiting to prevent abuse
# - Caching of static content
# - WebSocket support for streaming
# - Compression for bandwidth optimization

# Worker processes (auto-detect CPU cores)
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # =========================================================================
    # BASIC SETTINGS
    # =========================================================================
    
    include /etc/nginx/mime.types;
    default_type application/json;
    
    # Logging format with request timing
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # Performance tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    
    # Buffer sizes
    client_body_buffer_size 16k;
    client_max_body_size 10m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    
    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/xml application/xml+rss text/javascript application/x-javascript;
    gzip_min_length 1000;
    
    # =========================================================================
    # RATE LIMITING
    # =========================================================================
    
    # Zone for rate limiting (10MB can hold ~160,000 IPs)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $http_x_tenant_id zone=tenant_limit:10m rate=1000r/s;
    
    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    
    # =========================================================================
    # UPSTREAM - API SERVERS
    # =========================================================================
    
    upstream api_servers {
        # Load balancing method
        # - least_conn: Route to server with fewest active connections
        # - ip_hash: Sticky sessions based on client IP
        # - random two least_conn: Pick 2 random, use one with fewer connections
        least_conn;
        
        # API server instances
        # Docker Compose will resolve 'api' to all container IPs
        server api:3000 weight=1 max_fails=3 fail_timeout=30s;
        
        # For manual scaling, add more servers:
        # server api-1:3000 weight=1 max_fails=3 fail_timeout=30s;
        # server api-2:3000 weight=1 max_fails=3 fail_timeout=30s;
        # server api-3:3000 weight=1 max_fails=3 fail_timeout=30s;
        
        # Keep connections alive to upstreams
        keepalive 64;
        keepalive_timeout 60s;
        keepalive_requests 1000;
    }
    
    # =========================================================================
    # HEALTH CHECK UPSTREAM (for active health checks)
    # =========================================================================
    
    # Note: Active health checks require nginx-plus or the nginx_upstream_check_module
    # The passive health checks above (max_fails, fail_timeout) work in open source nginx
    
    # =========================================================================
    # MAIN SERVER BLOCK
    # =========================================================================
    
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        
        # Redirect to HTTPS in production
        # return 301 https://$host$request_uri;
        
        # For development/testing, proxy directly
        include /etc/nginx/conf.d/locations.conf;
    }
    
    # =========================================================================
    # HTTPS SERVER BLOCK (uncomment for production)
    # =========================================================================
    
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name _;
    #     
    #     # SSL certificates (use Let's Encrypt or your CA)
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     
    #     # SSL settings
    #     ssl_session_timeout 1d;
    #     ssl_session_cache shared:SSL:50m;
    #     ssl_session_tickets off;
    #     
    #     # Modern SSL configuration
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #     
    #     include /etc/nginx/conf.d/locations.conf;
    # }
}
