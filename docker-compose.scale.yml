# Docker Compose for Scalable Deployment
# 
# This configuration provides horizontal scaling with:
# - Redis for distributed L1/L2 cache
# - Qdrant for production vector search
# - Multiple API replicas
#
# Usage:
#   docker compose -f docker-compose.scale.yml up -d
#
# Scale API replicas:
#   docker compose -f docker-compose.scale.yml up -d --scale api=3

version: '3.8'

services:
  # ============================================================================
  # REDIS - Distributed L1/L2 Cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: dsc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # QDRANT - Production Vector Database
  # ============================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: dsc-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # API - Semantic Cache Service (Scalable)
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000-3010:3000"
    environment:
      # Storage Backend
      - CACHE_STORAGE=redis
      - VECTOR_STORE=qdrant
      
      # Redis Configuration
      - REDIS_URL=redis://redis:6379
      - REDIS_PREFIX=dsc:
      
      # Qdrant Configuration
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=semantic_cache
      
      # Embeddings (local for privacy/cost)
      - EMBEDDING_PROVIDER=local
      - LOCAL_EMBEDDING_MODEL=all-MiniLM-L6-v2
      
      # Cache Configuration
      - MAX_CACHE_SIZE=100000
      - SIMILARITY_THRESHOLD=0.85
      
      # Privacy
      - PRIVACY_MODE=normal
      - AUDIT_ENABLED=true
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================================================
  # NGINX - Load Balancer (Optional)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: dsc-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    profiles:
      - loadbalancer
    restart: unless-stopped

volumes:
  redis-data:
  qdrant-data:

networks:
  default:
    name: dsc-network
