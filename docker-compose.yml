version: '3.8'

services:
  # Main API service
  semantic-cache-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: semantic-cache-api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/cache.db
      - TENANTS_DB_PATH=/app/data/tenants.db
      - ANALYTICS_DB_PATH=/app/data/analytics.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ENABLE_ENCRYPTION=${ENABLE_ENCRYPTION:-true}
      - ENABLE_AUDIT_LOG=${ENABLE_AUDIT_LOG:-true}
      - ENABLE_SMART_MATCHING=${ENABLE_SMART_MATCHING:-true}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - cache-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - semantic-cache-network

  # Optional: Redis for distributed caching (future enhancement)
  redis:
    image: redis:7-alpine
    container_name: semantic-cache-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - semantic-cache-network
    profiles:
      - with-redis

  # Optional: PostgreSQL for multi-tenant production deployments
  postgres:
    image: postgres:16-alpine
    container_name: semantic-cache-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-semantic_cache}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-semantic_cache}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-semantic_cache}"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - semantic-cache-network
    profiles:
      - with-postgres

  # Web dashboard (optional)
  semantic-cache-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: semantic-cache-web
    ports:
      - "${WEB_PORT:-3001}:80"
    environment:
      - VITE_API_URL=http://semantic-cache-api:3000
    depends_on:
      semantic-cache-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - semantic-cache-network
    profiles:
      - with-web

  # Monitoring: Prometheus (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: semantic-cache-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - semantic-cache-network
    profiles:
      - with-monitoring

  # Monitoring: Grafana (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: semantic-cache-grafana
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - semantic-cache-network
    profiles:
      - with-monitoring

networks:
  semantic-cache-network:
    driver: bridge

volumes:
  cache-data:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
